name: Update map data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch blockchain data
        run: python fetch_data.py

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          touch hq_captures.json free_turf_attacks.json owned_turf_attacks.json
          git add data.json history.json snapshots/ hq_captures.json player_history.json raids.json player_activity.json player_history_daily.json hq_destroyed.json free_turf_attacks.json owned_turf_attacks.json
          git status
          git diff --staged --quiet || (git commit -m "Update map data $(date -u +'%Y-%m-%d %H:%M UTC')" && git pull --rebase && git push)
