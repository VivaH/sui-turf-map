name: Trigger map refresh

on:
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch refresh event
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/Hook27/sui-turf-map/dispatches \
            -d '{"event_type":"refresh-map"}'
